name: Bug Autofix mit Claude Code CLI

on:
  issues:
    types: [labeled]

jobs:
  autofix:
    if: github.event.label.name == 'bug'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install || true

      - name: Install Claude Code CLI + GitHub CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          gh --version
          claude --version

      - name: Git config
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Claude Code Bug Fix
        id: claude_fix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          BRANCH="fix/bug-${ISSUE_NUMBER}"
          PROMPT_FILE=$(mktemp)
          cat > "${PROMPT_FILE}" <<EOF
          Du bist Senior Frontend-Entwickler fuer das EO IPSO CRM.
          Lies zuerst CLAUDE.md fuer Stack-Kontext.

          GitHub Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Beschreibung:
          ${ISSUE_BODY}

          Aufgabe:
          1. Analysiere alle relevanten Files im Repo
          2. Finde Root Cause des Bugs
          3. Entscheide: Ist ein eindeutiger Code-Fix moeglich?

          WENN JA (eindeutiger Code-Fix):
          - git checkout -b ${BRANCH}
          - Minimaler Fix, nur betroffene Files
          - Falls TypeScript: npx tsc --noEmit (ignoriere falls kein TS-Projekt)
          - git add -A && git commit -m "fix: ${ISSUE_TITLE} (fixes #${ISSUE_NUMBER})"
          - git push origin ${BRANCH}
          - gh pr create --title "fix: ${ISSUE_TITLE} (fixes #${ISSUE_NUMBER})" --body "Fix fuer #${ISSUE_NUMBER}. Beschreibe in 2-3 Saetzen was geaendert wurde. fixes #${ISSUE_NUMBER}" --base main --head ${BRANCH}
          - Hole die PR-URL: gh pr view --head ${BRANCH} --json url --jq .url > /tmp/pr_url.txt
          - echo "PR_CREATED=true" > /tmp/fix_result.txt

          WENN NEIN (zu komplex, zu wenig Info):
          - echo "PR_CREATED=false" > /tmp/fix_result.txt
          - gh issue comment ${ISSUE_NUMBER} --body "## Claude Code Analyse - Automatischer Fix nicht moeglich. Grund: [erklaere kurz]. Manuell zu pruefen: [konkrete Hinweise]. Wahrscheinlich betroffene Files: [Liste]."

          NIEMALS auf main committen. Nur betroffene Files aendern.
          EOF

          claude --dangerously-skip-permissions -p "$(cat ${PROMPT_FILE})"

      - name: Telegram Push
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FIX_RESULT=$(cat /tmp/fix_result.txt 2>/dev/null || echo "unknown")
          PR_URL=$(cat /tmp/pr_url.txt 2>/dev/null || echo "")
          ISSUE_URL="https://github.com/trehl-ai/azure-opus-base/issues/${{ github.event.issue.number }}"

          if [ "${{ job.status }}" = "failure" ]; then
            MSG="⚠️ Autofix fehlgeschlagen\n\n<b>#${{ github.event.issue.number }}: ${{ github.event.issue.title }}</b>\n\nGitHub Action Fehler — Actions-Log prüfen.\n\n${ISSUE_URL}"
          elif [ "$FIX_RESULT" = "PR_CREATED=true" ] && [ -n "$PR_URL" ]; then
            MSG="🔧 Fix-PR bereit\n\n<b>#${{ github.event.issue.number }}: ${{ github.event.issue.title }}</b>\n\n${PR_URL}"
          else
            MSG="💭 Kein automatischer Fix\n\n<b>#${{ github.event.issue.number }}: ${{ github.event.issue.title }}</b>\n\nAnalyse am Issue.\n\n${ISSUE_URL}"
          fi

          curl -s -X POST "https://api.telegram.org/bot8439088713:AAGmj1hZN_Z6kXEC9jMl3LDaK-GrprhUYC0/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"6299105090\",\"text\":\"${MSG}\",\"parse_mode\":\"HTML\",\"disable_web_page_preview\":true}"
