name: Bug Autofix mit Claude Code

on:
  issues:
    types: [labeled]

jobs:
  autofix:
    if: github.event.label.name == 'bug'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install || true

      - name: Claude Code Bug Fix
        id: claude_fix
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          label_trigger: bug
          branch_prefix: fix/bug-
          prompt: |
            Du bist Senior Frontend-Entwickler für das EO IPSO CRM (crm.ts-connect.cloud).
            Lies zuerst CLAUDE.md für Stack-Kontext.

            GitHub Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            Beschreibung:
            ${{ github.event.issue.body }}

            Aufgabe:
            1. Analysiere Root Cause im Code — lies alle relevanten Files
            2. Entscheide: Ist ein automatischer Code-Fix möglich?

            WENN JA (eindeutiger Code-Fix):
            - Erstelle Branch: fix/bug-${{ github.event.issue.number }}
            - Minimaler Fix — nur betroffene Files, kein Refactoring
            - TypeScript prüfen: npx tsc --noEmit
            - Commit: "fix: ${{ github.event.issue.title }} (fixes #${{ github.event.issue.number }})"
            - Push Branch
            - Pull Request erstellen mit Titel: "fix: ${{ github.event.issue.title }} (fixes #${{ github.event.issue.number }})"
            - Schreibe "PR_CREATED=true" in die Datei /tmp/fix_result.txt
            - Schreibe PR URL in /tmp/pr_url.txt

            WENN NEIN (zu komplex, zu wenig Info, kein eindeutiger Fix):
            - Schreibe "PR_CREATED=false" in /tmp/fix_result.txt
            - Schreibe eine kurze Erklärung in /tmp/fix_reason.txt:
              - Was ist das Problem
              - Warum kein automatischer Fix möglich
              - Was manuell geprüft werden sollte
              - Welche Files wahrscheinlich betroffen sind
            - Poste diese Erklärung als Comment am GitHub Issue #${{ github.event.issue.number }}

            NIEMALS:
            - Direkt auf main committen
            - Supabase Service Role Key in Code schreiben
            - Andere Supabase Projekte als ttgvhqygmgtnjgwunuwz verwenden
            - Globale Refactors machen
          claude_args: |
            --max-turns 20
            --model claude-sonnet-4-5

      - name: Telegram Push - Fix PR bereit
        if: success()
        run: |
          FIX_RESULT=$(cat /tmp/fix_result.txt 2>/dev/null || echo "unknown")
          PR_URL=$(cat /tmp/pr_url.txt 2>/dev/null || echo "")
          ISSUE_URL="https://github.com/trehl-ai/azure-opus-base/issues/${{ github.event.issue.number }}"

          if [ "$FIX_RESULT" = "PR_CREATED=true" ] && [ -n "$PR_URL" ]; then
            curl -s -X POST "https://api.telegram.org/bot8439088713:AAGmj1hZN_Z6kXEC9jMl3LDaK-GrprhUYC0/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{
                \"chat_id\": \"6299105090\",
                \"text\": \"🔧 Fix-PR bereit\\n\\n<b>#${{ github.event.issue.number }}: ${{ github.event.issue.title }}</b>\\n\\n${PR_URL}\",
                \"parse_mode\": \"HTML\",
                \"disable_web_page_preview\": true
              }"
          else
            curl -s -X POST "https://api.telegram.org/bot8439088713:AAGmj1hZN_Z6kXEC9jMl3LDaK-GrprhUYC0/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{
                \"chat_id\": \"6299105090\",
                \"text\": \"💭 Kein automatischer Fix\\n\\n<b>#${{ github.event.issue.number }}: ${{ github.event.issue.title }}</b>\\n\\nClaude hat den Bug analysiert aber keinen eindeutigen Code-Fix gefunden. Analyse am Issue.\\n\\n${ISSUE_URL}\",
                \"parse_mode\": \"HTML\",
                \"disable_web_page_preview\": true
              }"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Telegram Push - Fehler
        if: failure()
        run: |
          ISSUE_URL="https://github.com/trehl-ai/azure-opus-base/issues/${{ github.event.issue.number }}"
          curl -s -X POST "https://api.telegram.org/bot8439088713:AAGmj1hZN_Z6kXEC9jMl3LDaK-GrprhUYC0/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"6299105090\",
              \"text\": \"⚠️ Autofix fehlgeschlagen\\n\\n<b>#${{ github.event.issue.number }}: ${{ github.event.issue.title }}</b>\\n\\nGitHub Action Fehler — manuelle Prüfung nötig.\\n\\n${ISSUE_URL}\",
              \"parse_mode\": \"HTML\",
              \"disable_web_page_preview\": true
            }"
