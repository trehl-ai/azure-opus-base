name: env-guard
on:
  push:
    branches: [main, lovable/ui]
  pull_request:
    branches: [main]

jobs:
  check-env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Supabase instance
        run: bash scripts/check-env.sh
      
      - name: Check for dead Lovable code
        run: |
          if grep -r "qgvedroebvmwhnjmeyip" src/ 2>/dev/null; then
            echo "❌ Falsche Supabase-URL in src/ gefunden"
            exit 1
          fi
          echo "✅ Keine falsche Supabase-URL in src/"
