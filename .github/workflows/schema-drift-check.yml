name: Schema Drift Check

# Detects when Supabase DB has migrations that aren't in this repo (Lovable
# bypass risk) or vice versa. Compares versions in supabase/migrations/*.sql
# filenames against supabase_migrations.schema_migrations.version on the live
# project ttgvhqygmgtnjgwunuwz.
#
# Required GitHub Actions secret:
#   SUPABASE_ACCESS_TOKEN — Supabase Management API PAT with read access to
#   the project's database query endpoint. Set via:
#   Repo → Settings → Secrets and variables → Actions → New secret.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  drift-check:
    runs-on: ubuntu-latest
    env:
      PROJECT_REF: ttgvhqygmgtnjgwunuwz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify SUPABASE_ACCESS_TOKEN secret is configured
        env:
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not configured."
            echo "Add the Supabase Management API PAT via Repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Fetch migration versions from live DB
        env:
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"SELECT version FROM supabase_migrations.schema_migrations ORDER BY version"}')

          http_code=$(printf '%s' "$response" | tail -n1)
          body=$(printf '%s' "$response" | sed '$d')

          # Supabase Management API returns 200 or 201 for successful queries.
          if [ "$http_code" != "200" ] && [ "$http_code" != "201" ]; then
            echo "::error::Supabase Management API returned HTTP $http_code"
            echo "$body"
            exit 1
          fi

          printf '%s' "$body" | jq -r '.[].version' | sort -u > db_versions.txt
          echo "DB migrations: $(wc -l < db_versions.txt)"

      - name: List repo migration versions
        run: |
          set -euo pipefail
          if [ ! -d supabase/migrations ]; then
            echo "::error::supabase/migrations/ directory is missing."
            exit 1
          fi
          # Extract leading 14-digit version prefix from each filename.
          find supabase/migrations -maxdepth 1 -type f -name '*.sql' \
            | sed -E 's|.*/([0-9]{14})_.*\.sql$|\1|' \
            | grep -E '^[0-9]{14}$' \
            | sort -u > repo_versions.txt
          echo "Repo migrations: $(wc -l < repo_versions.txt)"

      - name: Load historical-drift baseline
        run: |
          set -euo pipefail
          BASELINE=.github/schema-drift-baseline.txt
          if [ -f "$BASELINE" ]; then
            # Strip comments + blank lines, keep only 14-digit version lines.
            grep -E '^[0-9]{14}$' "$BASELINE" | sort -u > baseline_versions.txt
          else
            : > baseline_versions.txt
          fi
          echo "Baseline (tolerated historical DB_ONLY): $(wc -l < baseline_versions.txt)"

      - name: Detect drift
        run: |
          set -euo pipefail
          # DB_ONLY = in DB but not in repo. Includes both historical drift
          # (tolerated via baseline) and out-of-band post-baseline drift (FAIL).
          comm -23 db_versions.txt repo_versions.txt > db_only.txt
          # REPO_ONLY = in repo but not (yet) in DB → pending migration → WARNING.
          comm -13 db_versions.txt repo_versions.txt > repo_only.txt

          # NEW_DB_ONLY = DB_ONLY minus baseline (anything not already known).
          comm -23 db_only.txt baseline_versions.txt > new_db_only.txt
          # STILL_TOLERATED = DB_ONLY entries that ARE in the baseline.
          comm -12 db_only.txt baseline_versions.txt > tolerated.txt

          echo "DB_ONLY total: $(wc -l < db_only.txt)"
          echo "  tolerated (baseline): $(wc -l < tolerated.txt)"
          echo "  NEW (not in baseline): $(wc -l < new_db_only.txt)"
          echo "REPO_ONLY: $(wc -l < repo_only.txt)"

          fail=0

          if [ -s new_db_only.txt ]; then
            echo "::error::DRIFT — NEW migrations exist in DB but not in repo (possible out-of-band/Lovable bypass):"
            while IFS= read -r v; do
              echo "  - $v"
              echo "::error file=supabase/migrations,title=Missing migration file::Version $v exists in supabase_migrations.schema_migrations but no matching supabase/migrations/${v}_*.sql file in repo, and is not in .github/schema-drift-baseline.txt."
            done < new_db_only.txt
            fail=1
          fi

          if [ -s repo_only.txt ]; then
            echo "::warning::Migrations in repo not yet applied to live DB (expected on open PR before merge, or historical Lovable-pre-DB-reset files):"
            while IFS= read -r v; do
              echo "  - $v"
            done < repo_only.txt
          fi

          if [ "$fail" -eq 1 ]; then
            echo ""
            echo "How to fix a NEW DB_ONLY drift:"
            echo "  1. Identify the source (Lovable, Dashboard SQL Editor, supabase CLI direct apply)."
            echo "  2. Either backfill the migration as a supabase/migrations/<version>_<name>.sql file"
            echo "     with the SQL that produces the current DB state,"
            echo "  3. OR (if the migration is intentional historical work) add the version to"
            echo "     .github/schema-drift-baseline.txt — but prefer (2) for any new drift."
            exit 1
          fi

          echo ""
          if [ -s tolerated.txt ]; then
            echo "OK: $(wc -l < tolerated.txt) tolerated baseline DB_ONLY entries, 0 new drift."
          else
            echo "OK: no drift between repo and live DB schema_migrations."
          fi
